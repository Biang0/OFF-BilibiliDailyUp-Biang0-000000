name: B站自动签到

on:
  schedule:
    - cron: '0 17 * * *'  # 每天凌晨 1:00 执行
    - cron: '0 0 */3 * *' # 每3天清理一次日志
  workflow_dispatch:     # 手动运行

jobs:
  自动任务:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行B站签到
        run: python main.py

      # 清理本地 log.md（只保留最近3天内容）
      - name: 清理本地日志
        run: |
          if [ -f log.md ]; then
            tail -n 200 log.md > tmp && mv tmp log.md
          fi

      # 清理 GitHub 后台运行记录（只保留1天）
      - name: 清理GitHub运行日志
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 0
          delete_workflow_pattern: '*'
          delete_consecutive_pages: 20

      # 防止60天无活动被GitHub禁用
      - name: 保活防止停止
        run: echo "任务正常运行中"
