name: "B站自动签到"

on:
  schedule:
    - cron: "0 17 * * *"
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  auto_task:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 👇 👇 👇 这里会自动隐藏所有UID和用户名！
      - name: 执行签到并隐藏隐私
        run: |
          python main.py > run.log 2>&1
          sed -i "s/[0-9]\{8,12\}/***/g" run.log
          sed -i "s/用户[^,]*，uid/用户***，uid/g" run.log
          cat run.log >> log.md
          rm run.log

      - name: 清理本地日志
        run: |
          if [ -f log.md ]; then
            tail -n 100 log.md > tmp && mv tmp log.md
          fi

      - name: 清理GitHub运行日志
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 0

      - name: 保活防止60天停止
        run: echo "alive"
