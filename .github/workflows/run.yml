name: "B站自动签到"

on:
  schedule:
    - cron: "0 17 * * *"
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  auto_task:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行B站自动签到
        run: python main.py

      - name: 清理GitHub运行日志
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 0

      - name: 保活防止60天停止
        run: echo "alive"
