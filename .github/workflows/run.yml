name: B站自动签到

on:
  schedule:
    - cron: '0 17 * * *'  # 每天凌晨 1:00 运行
    - cron: '0 0 */3 * *' # 每3天清理日志
  workflow_dispatch:

jobs:
  auto_task:  # 这里修复为英文，不报错
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行B站签到
        run: python main.py

      # 本地日志只保留最近3天（精简最新200行）
      - name: 清理本地日志
        run: |
          if [ -f log.md ]; then
            tail -n 200 log.md > tmp && mv tmp log.md
          fi

      # GitHub日志只保留 1 天
      - name: 清理GitHub运行日志
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 0
          delete_workflow_pattern: '*'

      # 防止60天停止
      - name: 保活防止禁用
        run: echo "keep alive"
